name=ExtendedTicker
version=1.0.0
author=Faruk
maintainer=Faruk
sentence=Extended Ticker library for ESP8266/ESP32 with repeatN, repeatUntil, repeatFor, once_after, pause/resume and status queries.
paragraph=Builds on top of the built-in Ticker class to add: firing a callback exactly N times, repeating until a condition is met, repeating for a fixed duration, a delay-then-repeat pattern, pause/resume of any running series, and elapsed/remaining tick counters. All features include optional onComplete callbacks. Fully safe with shared_ptr lifetime sentinels.
category=Timing
url=https://github.com/faruk/ExtendedTicker
architectures=esp8266,esp32
depends=Ticker
